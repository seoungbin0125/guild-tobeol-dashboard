<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>길드 토벌전 대시보드</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Guild Battle Dashboard</p>
        <h1 id="title">길드 성장률 대시보드</h1>
        <p id="subtitle">전투력 · 토벌전 현황</p>
      </div>
      <div class="hero-actions">
        <button class="tab active" data-tab="power">전투력</button>
        <button class="tab" data-tab="tobeol">토벌전</button>
      </div>
    </section>

    <section class="summary-grid" id="summary-grid"></section>

    <section class="toolbar">
      <label>
        길드
        <select id="guild-filter">
          <option value="all">전체</option>
        </select>
      </label>
      <label>
        검색
        <input id="keyword" type="search" placeholder="길드 / 닉네임 / 직업" />
      </label>
      <label>
        정렬
        <select id="sort">
          <option value="powerGrowth">전투력 성장 높은순</option>
          <option value="power">현재 전투력 높은순</option>
          <option value="tobeolGrowth">토벌전 성장 높은순</option>
          <option value="tobeol">토벌전 점수 높은순</option>
          <option value="level">레벨 높은순</option>
          <option value="rank">길드 순위순</option>
        </select>
      </label>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 id="panel-title">전투력 성장</h2>
        <p id="panel-desc">최신 수집 데이터 기준입니다.</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>

    <footer>
      <span id="footer-text">데이터 로딩 중...</span>
    </footer>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
